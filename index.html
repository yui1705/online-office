<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>효암고 온라인 교무실 | 교직원 업무 포털</title>
    <meta name="description" content="효암고등학교 교직원을 위한 온라인 교무실 업무 포털입니다.">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css?v=20260623-timetable-tags-01">
</head>
<body class="light-theme">
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="layout-dashboard"></i>
                    <span>효암고 교무실</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active" data-section="home">
                        <button class="nav-button" type="button">
                            <i data-lucide="home"></i>
                            <span>오늘의 교무실</span>
                        </button>
                    </li>
                    <li data-section="notices">
                        <button class="nav-button" type="button">
                            <i data-lucide="bell"></i>
                            <span>공지·전달사항</span>
                        </button>
                    </li>
                    <li data-section="sheets">
                        <button class="nav-button" type="button">
                            <i data-lucide="table-2"></i>
                            <span>부서별 업무 링크</span>
                        </button>
                    </li>
                    <li data-section="documents">
                        <button class="nav-button" type="button">
                            <i data-lucide="file-text"></i>
                            <span>업무 서식함</span>
                        </button>
                    </li>
                    <li data-section="academic-schedule">
                        <button class="nav-button" type="button">
                            <i data-lucide="calendar-days"></i>
                            <span>학사일정</span>
                        </button>
                    </li>
                    <li data-section="weekly-timetable">
                        <button class="nav-button" type="button">
                            <i data-lucide="calendar-clock"></i>
                            <span>주간 시간표</span>
                        </button>
                    </li>
                    <li data-section="special-room-reservations">
                        <button class="nav-button" type="button">
                            <i data-lucide="calendar-check"></i>
                            <span>특별실 예약 현황</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-divider"></div>
            <div class="sidebar-quick-links">
                <span class="sidebar-label">자주 쓰는 업무</span>
                <ul id="sidebar-quick-links-list">
                    <!-- Injected by main.js -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn-icon" type="button" aria-label="테마 변경">
                    <i data-lucide="sun" id="theme-icon"></i>
                </button>
                <div class="user-info">
                    <span class="user-name">교직원 전용</span>
                </div>
                <div class="visitor-counter" id="visitor-counter" hidden>
                    <div class="visitor-counter-icon">
                        <i data-lucide="users"></i>
                    </div>
                    <div class="visitor-counter-text">
                        <span id="visitor-today">오늘 0명</span>
                        <span id="visitor-total">전체 0명</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input id="global-search" type="text" placeholder="공지, 서식, 링크 검색">
                </div>
                <div class="header-actions">
                    <a class="date-display" id="current-date" data-game-href="mini_game/" target="_blank" rel="noopener" title="다크모드에서 미니게임 열기" aria-label="미니게임 목록 열기" aria-disabled="true"></a>
                </div>
            </header>

            <section id="content-area">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>교무실 데이터를 불러오는 중입니다...</p>
                </div>
            </section>
        </main>
    </div>
    <div class="creator-credit">
        <strong>효암고등학교 교무기획부</strong>
        <span>Designed &amp; Built by Yang.</span>
    </div>

</body>
